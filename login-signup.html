<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CephasGM AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("https://images.unsplash.com/photo-1508672019048-805c876b67e2");
background-size:cover;
background-position:center;
color:white;
}
.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}
.auth-box{
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
border:1px solid rgba(255,179,0,0.3);
}
h2{
color:#ffb300;
font-size:2.5rem;
margin-bottom:10px;
}
h3{
margin-bottom:30px;
font-weight:normal;
}
input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:30px;
border:none;
font-size:16px;
box-sizing:border-box;
}
input:focus{
outline:2px solid #ffb300;
}
button{
padding:12px 30px;
font-size:16px;
border:none;
border-radius:30px;
cursor:pointer;
background:#ffb300;
color:black;
margin:10px 5px;
font-weight:bold;
min-width:120px;
}
button:hover{
background:#ffa000;
}
.back-link{
margin-top:20px;
}
.back-link a{
color:#ffb300;
text-decoration:none;
}
.back-link a:hover{
text-decoration:underline;
}
#message{
margin-top:15px;
padding:10px;
border-radius:5px;
display:none;
}
#message.show{
display:block;
}
#message.error{
background:rgba(220,53,69,0.3);
border-left:3px solid #dc3545;
}
#message.success{
background:rgba(40,167,69,0.3);
border-left:3px solid #28a745;
}
</style>
</head>
<body>
<div class="overlay">
<div class="auth-box">
<h2>CephasGM AI</h2>
<h3>Welcome Back</h3>
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>
<div>
<button onclick="handleSignup()">Sign Up</button>
<button onclick="handleLogin()">Log In</button>
</div>
<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>
<div id="message"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAukJQx3pEqXoyFR9tyfeLckJaBIgYtGFA",
  authDomain: "cephasgm-ai.firebaseapp.com",
  projectId: "cephasgm-ai",
  storageBucket: "cephasgm-ai.firebasestorage.app",
  messagingSenderId: "304163647028",
  appId: "1:304163647028:web:2920b2cfb9be4049806461"
};

// Initialize Firebase only once
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();

function showMessage(text, type) {
  const msgDiv = document.getElementById('message');
  msgDiv.textContent = text;
  msgDiv.className = type + ' show';
}

function handleSignup() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showMessage('Please fill in all fields', 'error');
    return;
  }

  if (password.length < 6) {
    showMessage('Password must be at least 6 characters', 'error');
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      showMessage('Signup successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'index.html', 1500);
    })
    .catch(error => {
      showMessage(error.message, 'error');
    });
}

function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showMessage('Please fill in all fields', 'error');
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      showMessage('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'index.html', 1500);
    })
    .catch(error => {
      showMessage(error.message, 'error');
    });
}

// Auto redirect if already logged in
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>
