<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CephasGM AI</title>
<link rel="icon" href="icon-192.png">
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("https://images.unsplash.com/photo-1508672019048-805c876b67e2");
background-size:cover;
background-position:center;
color:white;
}
.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}
.auth-box{
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:15px;
width:90%;
max-width:400px;
backdrop-filter:blur(10px);
}
h2{
font-size:2.5rem;
margin-bottom:20px;
color:#ffb300;
}
input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:16px;
box-sizing:border-box;
}
input:focus{
outline:2px solid #ffb300;
}
button{
padding:15px 25px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ffb300;
color:black;
margin:10px 5px;
font-weight:bold;
min-width:120px;
}
button:hover{
opacity:0.9;
}
.back-link{
margin-top:20px;
}
.back-link a{
color:#ffb300;
text-decoration:none;
}
.message{
margin-top:15px;
color:#ffb300;
}
</style>
</head>
<body>
<div class="overlay">
<div class="auth-box">
<h2>CephasGM AI</h2>
<h3>Login / Signup</h3>
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>
<div>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Log In</button>
</div>
<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>
<div id="message" class="message"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAukJQx3pEqXoyFR9tyfeLckJaBIgYtGFA",
authDomain: "cephasgm-ai.firebaseapp.com",
projectId: "cephasgm-ai",
storageBucket: "cephasgm-ai.firebasestorage.app",
messagingSenderId: "304163647028",
appId: "1:304163647028:web:2920b2cfb9be4049806461"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function showMessage(msg) {
document.getElementById("message").textContent = msg;
}

// Check if already logged in
auth.onAuthStateChanged(user => {
if (user) {
  // Already logged in, redirect back
  window.location.href = "index.html";
}
});

window.signup = function() {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

if (!email || !password) {
  showMessage("Please fill in all fields");
  return;
}

if (password.length < 6) {
  showMessage("Password must be at least 6 characters");
  return;
}

auth.createUserWithEmailAndPassword(email, password)
  .then(() => {
    window.location.href = "index.html";
  })
  .catch(error => {
    showMessage(error.message);
  });
};

window.login = function() {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

if (!email || !password) {
  showMessage("Please fill in all fields");
  return;
}

auth.signInWithEmailAndPassword(email, password)
  .then(() => {
    window.location.href = "index.html";
  })
  .catch(error => {
    showMessage(error.message);
  });
};
</script>
</body>
</html>
