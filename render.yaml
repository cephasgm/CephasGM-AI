services:
  - type: web
    name: cephasgm-ai
    runtime: node
    repo: https://github.com/cephasgm/CephasGM-AI
    branch: main
    buildCommand: npm run build:react
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OLLAMA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STABILITY_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
