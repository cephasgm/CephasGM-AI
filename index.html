<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CephasGM AI</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" href="icon-192.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

background-image:url("https://images.unsplash.com/photo-1508672019048-805c876b67e2");
background-size:cover;
background-position:center;
color:white;
}

.overlay{
background:rgba(0,0,0,0.6);
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h1{
font-size:3rem;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
background:#ffb300;
color:black;
margin:10px;
}

.chat-box{
width:90%;
max-width:700px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<script type="text/babel">

function App(){

const [message,setMessage] = React.useState("")
const [chat,setChat] = React.useState([])

function send(){

if(!message) return

setChat([...chat,{user:message,ai:"AI response placeholder"}])
setMessage("")
}

return(

<div className="overlay">

<h1>CephasGM AI</h1>

<p>African Inspired Artificial Intelligence</p>

<a href="login-signup.html">
<button>Login / Signup (Optional)</button>
</a>

<div className="chat-box">

{chat.map((c,i)=>(
<div key={i}>
<p><b>You:</b> {c.user}</p>
<p><b>AI:</b> {c.ai}</p>
</div>
))}

<input
value={message}
onChange={(e)=>setMessage(e.target.value)}
placeholder="Ask CephasGM AI anything..."
/>

<button onClick={send}>Send</button>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js')
.then(()=>console.log("Service Worker Registered"))

}
</script>
</body>
</html>
