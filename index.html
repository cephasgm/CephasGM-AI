<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CephasGM AI</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("https://images.unsplash.com/photo-1508672019048-805c876b67e2");
background-size:cover;
background-position:center;
color:white;
}
.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}
.auth-box{
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
border:1px solid rgba(255,179,0,0.3);
}
h2{
color:#ffb300;
font-size:2.5rem;
margin:0 0 30px 0;
}
input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:30px;
border:none;
font-size:16px;
box-sizing:border-box;
}
input:focus{
outline:2px solid #ffb300;
}
.button-group{
display:flex;
gap:10px;
justify-content:center;
margin-top:20px;
}
button{
flex:1;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:30px;
cursor:pointer;
background:#ffb300;
color:black;
font-weight:bold;
max-width:150px;
}
button:hover{
background:#ffa000;
}
.back-link{
margin-top:20px;
}
.back-link a{
color:#ffb300;
text-decoration:none;
}
</style>
</head>
<body>
<div class="overlay">
<div class="auth-box">
<h2>CephasGM AI</h2>
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>
<div class="button-group">
<button onclick="handleSignup()">Sign Up</button>
<button onclick="handleLogin()">Log In</button>
</div>
<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAukJQx3pEqXoyFR9tyfeLckJaBIgYtGFA",
  authDomain: "cephasgm-ai.firebaseapp.com",
  projectId: "cephasgm-ai",
  storageBucket: "cephasgm-ai.firebasestorage.app",
  messagingSenderId: "304163647028",
  appId: "1:304163647028:web:2920b2cfb9be4049806461"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();

window.handleSignup = function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    alert('Please fill in all fields');
    return;
  }

  if (password.length < 6) {
    alert('Password must be at least 6 characters');
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => window.location.href = 'index.html')
    .catch(error => alert(error.message));
};

window.handleLogin = function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    alert('Please fill in all fields');
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .then(() => window.location.href = 'index.html')
    .catch(error => alert(error.message));
};

// Redirect if already logged in
auth.onAuthStateChanged(user => {
  if (user) window.location.href = 'index.html';
});
</script>
</body>
</html>
