<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CephasGM AI - Complete AI Ecosystem</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .agent-card {
            transition: all 0.3s ease;
        }
        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="text-white">
    <div id="app" class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-pink-500">
                    🚀 CephasGM AI
                </h1>
                <p class="text-gray-300 mt-2">Complete AI Ecosystem - Phase 6</p>
            </div>
            <div id="user-info" class="hidden glass-morphism rounded-lg px-4 py-2">
                <span id="user-email" class="mr-4"></span>
                <button id="logout-btn" class="bg-red-500 hover:bg-red-600 px-4 py-1 rounded-lg text-sm">
                    Logout
                </button>
            </div>
            <div id="auth-buttons">
                <a href="login-signup.html" class="bg-yellow-500 hover:bg-yellow-600 text-black px-6 py-2 rounded-lg font-semibold">
                    Login / Signup
                </a>
            </div>
        </header>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar -->
            <div class="lg:col-span-1">
                <div class="glass-morphism rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4">🧠 AI OS</h2>
                    <div id="system-status" class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span>Status:</span>
                            <span class="text-green-400" id="os-status">Initializing...</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Agents:</span>
                            <span id="agent-count">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Tasks:</span>
                            <span id="task-count">0</span>
                        </div>
                    </div>

                    <div class="mt-6">
                        <h3 class="font-semibold mb-2">📊 Quick Actions</h3>
                        <div class="space-y-2">
                            <button onclick="showTab('chat')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-white/10">
                                💬 AI Chat
                            </button>
                            <button onclick="showTab('research')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-white/10">
                                🔬 Research Lab
                            </button>
                            <button onclick="showTab('code')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-white/10">
                                💻 Software Factory
                            </button>
                            <button onclick="showTab('multimodal')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-white/10">
                                🎨 Multimodal Studio
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-3">
                <!-- Chat Tab -->
                <div id="chat-tab" class="tab-content glass-morphism rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4">💬 AI Chat</h2>
                    <div id="chat-messages" class="h-96 overflow-y-auto mb-4 space-y-4 p-4 bg-black/20 rounded-lg"></div>
                    <div class="flex gap-2">
                        <input type="text" id="chat-input" placeholder="Ask anything..." 
                               class="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-yellow-500">
                        <button onclick="sendChatMessage()" 
                                class="bg-yellow-500 hover:bg-yellow-600 text-black px-6 py-3 rounded-lg font-semibold">
                            Send
                        </button>
                        <button onclick="startVoiceInput()" 
                                class="bg-purple-500 hover:bg-purple-600 px-4 py-3 rounded-lg">
                            🎤
                        </button>
                    </div>
                </div>

                <!-- Research Tab -->
                <div id="research-tab" class="tab-content hidden glass-morphism rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4">🔬 Research Lab</h2>
                    <div class="mb-4">
                        <input type="text" id="research-topic" placeholder="Enter research topic..." 
                               class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 mb-2">
                        <button onclick="conductResearch()" 
                                class="bg-green-500 hover:bg-green-600 px-6 py-2 rounded-lg">
                            Conduct Research
                        </button>
                    </div>
                    <div id="research-results" class="mt-4 p-4 bg-black/20 rounded-lg"></div>
                </div>

                <!-- Code Tab -->
                <div id="code-tab" class="tab-content hidden glass-morphism rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4">💻 Software Factory</h2>
                    <div class="mb-4">
                        <select id="code-language" class="bg-white/10 border border-white/20 rounded-lg px-4 py-2 mb-2">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="html">HTML</option>
                        </select>
                        <textarea id="code-input" rows="10" 
                                  class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 font-mono text-sm"></textarea>
                        <button onclick="runCode()" 
                                class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-lg mt-2">
                            Run Code
                        </button>
                    </div>
                    <div id="code-output" class="p-4 bg-black/20 rounded-lg font-mono text-sm"></div>
                </div>

                <!-- Multimodal Tab -->
                <div id="multimodal-tab" class="tab-content hidden glass-morphism rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4">🎨 Multimodal Studio</h2>
                    
                    <!-- Image Generation -->
                    <div class="mb-6">
                        <h3 class="text-xl mb-2">Image Generation</h3>
                        <input type="text" id="image-prompt" placeholder="Describe the image..." 
                               class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 mb-2">
                        <button onclick="generateImage()" 
                                class="bg-pink-500 hover:bg-pink-600 px-6 py-2 rounded-lg">
                            Generate
                        </button>
                        <div id="image-result" class="mt-4"></div>
                    </div>

                    <!-- Audio Generation -->
                    <div class="mb-6">
                        <h3 class="text-xl mb-2">Audio Generation</h3>
                        <textarea id="audio-text" rows="3" 
                                  class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 mb-2"
                                  placeholder="Enter text for speech synthesis..."></textarea>
                        <button onclick="generateAudio()" 
                                class="bg-purple-500 hover:bg-purple-600 px-6 py-2 rounded-lg">
                            Generate Speech
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Load Phase 6 Modules -->
    <script src="agents.js"></script>
    <script src="ai.js"></script>
    <script src="app.js"></script>
    <script src="image.js"></script>
    <script src="upload.js"></script>
    <script src="voice.js"></script>
    <script src="memory.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAukJQx3pEqXoyFR9tyfeLckJaBIgYtGFA",
            authDomain: "cephasgm-ai.firebaseapp.com",
            projectId: "cephasgm-ai",
            storageBucket: "cephasgm-ai.firebasestorage.app",
            messagingSenderId: "304163647028",
            appId: "1:304163647028:web:2920b2cfb9be4049806461"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Auth State Observer
        auth.onAuthStateChanged(user => {
            const userInfo = document.getElementById('user-info');
            const authButtons = document.getElementById('auth-buttons');
            const userEmail = document.getElementById('user-email');

            if (user) {
                userInfo.classList.remove('hidden');
                authButtons.classList.add('hidden');
                userEmail.textContent = user.email;
                initializeDashboard();
            } else {
                userInfo.classList.add('hidden');
                authButtons.classList.remove('hidden');
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            auth.signOut();
        });

        // Tab Management
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });
            document.getElementById(tabName + '-tab').classList.remove('hidden');
        }

        // Initialize Dashboard
        async function initializeDashboard() {
            try {
                const response = await fetch('http://localhost:6000/status');
                const data = await response.json();
                
                document.getElementById('os-status').textContent = data.os?.status || 'Ready';
                document.getElementById('agent-count').textContent = data.os?.agents?.length || 0;
                document.getElementById('task-count').textContent = data.os?.metrics?.tasksProcessed || 0;
            } catch (error) {
                console.log('Using local mode:', error);
            }
        }

        // Chat Functions
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            addChatMessage('You', message);
            input.value = '';

            try {
                const response = await fetch('http://localhost:6000/task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task: message })
                });
                const data = await response.json();
                addChatMessage('AI', data.result || 'No response');
            } catch (error) {
                addChatMessage('AI', 'Error: ' + error.message);
            }
        }

        function addChatMessage(sender, message) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = sender === 'You' ? 'text-right' : 'text-left';
            div.innerHTML = `<span class="inline-block glass-morphism rounded-lg px-4 py-2 max-w-2xl">
                <strong>${sender}:</strong> ${message}
            </span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Research Functions
        async function conductResearch() {
            const topic = document.getElementById('research-topic').value.trim();
            if (!topic) return;

            const results = document.getElementById('research-results');
            results.innerHTML = '<p class="text-yellow-400">Researching...</p>';

            try {
                const response = await fetch('http://localhost:6000/task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task: `research ${topic}` })
                });
                const data = await response.json();
                results.innerHTML = `<pre class="whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                results.innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
            }
        }

        // Code Functions
        async function runCode() {
            const code = document.getElementById('code-input').value;
            const language = document.getElementById('code-language').value;

            const output = document.getElementById('code-output');
            output.innerHTML = '<p class="text-yellow-400">Executing...</p>';

            try {
                const response = await fetch('http://localhost:6000/task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        task: `run code ${code}`,
                        options: { language }
                    })
                });
                const data = await response.json();
                output.innerHTML = `<pre class="whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                output.innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
            }
        }

        // Image Generation
        async function generateImage() {
            const prompt = document.getElementById('image-prompt').value.trim();
            if (!prompt) return;

            const result = document.getElementById('image-result');
            result.innerHTML = '<p class="text-yellow-400">Generating...</p>';

            try {
                const response = await fetch('http://localhost:6000/generate/image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                if (data.url) {
                    result.innerHTML = `<img src="${data.url}" alt="${prompt}" class="max-w-full rounded-lg shadow-lg">`;
                } else {
                    result.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                result.innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
            }
        }

        // Audio Generation
        async function generateAudio() {
            const text = document.getElementById('audio-text').value.trim();
            if (!text) return;

            alert('Audio generation simulated. In production, this would return an audio file.');
        }

        // Voice Input
        function startVoiceInput() {
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                recognition.onresult = (event) => {
                    document.getElementById('chat-input').value = event.results[0][0].transcript;
                };
                recognition.start();
            } else {
                alert('Voice input not supported in this browser');
            }
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
</html>
